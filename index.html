<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>القهوجي | Algahwagy</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2B1B12">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F7F1E6;
  --paper:#FFFDF9;
  --espresso:#2B1B12;
  --coffee:#5C3A21;
  --coffee-light:#8B5E3C;
  --gold:#C79A3E;
  --gold-light:#EBD9AE;
  --brick:#A6402F;
  --sage:#4C7A55;
  --line:#E4D6BE;
  --shadow:0 2px 10px rgba(43,27,18,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--cream);
  color:var(--espresso);
  font-family:'Tajawal',Tahoma,Arial,sans-serif;
  direction:rtl;
  overflow-x:hidden;
}
h1,h2,h3,h4,.brand,.nav-label,.stat-label,button{font-family:'Cairo',Tahoma,Arial,sans-serif;}
::selection{background:var(--gold-light);}

/* ---------- App shell ---------- */
#app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--cream);position:relative;padding-bottom:78px;}

.topbar{
  background:linear-gradient(135deg,var(--espresso) 0%,var(--coffee) 100%);
  color:var(--gold-light);
  padding:16px 18px 20px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.topbar::before{
  content:"";
  position:absolute; inset:0;
  background-image: radial-gradient(circle at 15% 30%, rgba(199,154,62,.18) 0, transparent 45%),
                     radial-gradient(circle at 85% 80%, rgba(199,154,62,.12) 0, transparent 40%);
  pointer-events:none;
}
.topbar-row{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
.logo-badge{
  width:46px;height:46px;border-radius:14px;
  background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 3px 8px rgba(0,0,0,.25);
}
.brand-block{flex:1;min-width:0;}
.brand{font-size:19px;font-weight:800;color:#fff;margin:0;letter-spacing:.2px;}
.brand-sub{font-size:11.5px;color:var(--gold-light);opacity:.85;margin-top:1px;}
.back-btn{
  background:rgba(255,255,255,.12);border:none;color:#fff;
  width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.screen-title-top{font-size:17px;font-weight:800;color:#fff;flex:1;}

.content{padding:16px;}

/* ---------- Dashboard ---------- */
.date-strip{font-size:12.5px;color:var(--coffee-light);margin-bottom:12px;text-align:center;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:16px;
  padding:13px 14px;
  box-shadow:var(--shadow);
  position:relative;
}
.stat-card.wide{grid-column:1/3;display:flex;justify-content:space-between;align-items:center;}
.stat-value{font-size:20px;font-weight:800;color:var(--espresso);}
.stat-label{font-size:11.5px;color:var(--coffee-light);margin-top:3px;font-weight:500;}
.stat-icon{position:absolute;left:12px;top:12px;opacity:.35;}

.alert-box{
  border-radius:14px;padding:12px 14px;margin-bottom:10px;
  display:flex;gap:10px;align-items:flex-start;
  border:1px solid transparent;
}
.alert-box.warn{background:#FBF0E4;border-color:#EBCFA0;}
.alert-box.danger{background:#F8E7E4;border-color:#E7BEB6;}
.alert-title{font-weight:700;font-size:13.5px;margin-bottom:2px;}
.alert-body{font-size:12.5px;color:#5a4636;line-height:1.6;}
.alert-box.danger .alert-body{color:#6b3730;}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
.menu-btn{
  background:var(--paper);border:1px solid var(--line);border-radius:16px;
  padding:16px 10px; text-align:center; box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:transform .12s ease;
}
.menu-btn:active{transform:scale(.96);}
.menu-icon{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(160deg,var(--gold-light),var(--gold));
  display:flex;align-items:center;justify-content:center;
}
.menu-label{font-size:13px;font-weight:700;color:var(--espresso);}

/* ---------- Bottom nav ---------- */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;
  background:var(--paper);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:6px 2px 8px;
  box-shadow:0 -2px 10px rgba(0,0,0,.06);
  z-index:50;
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--coffee-light);flex:1;padding:4px 0;cursor:pointer;}
.nav-item.active{color:var(--coffee);}
.nav-label{font-size:10px;font-weight:700;}

/* ---------- Generic list/form ---------- */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-header h2{font-size:16px;margin:0;}
.btn{
  border:none;border-radius:11px;padding:10px 16px;font-weight:700;font-size:13.5px;
  cursor:pointer;font-family:'Cairo',Tahoma,sans-serif;
}
.btn-primary{background:var(--coffee);color:#fff;}
.btn-gold{background:var(--gold);color:var(--espresso);}
.btn-outline{background:transparent;border:1.5px solid var(--coffee);color:var(--coffee);}
.btn-danger{background:var(--brick);color:#fff;}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:9px;}
.btn-block{width:100%;}
.fab{
  position:fixed;bottom:88px;left:50%;transform:translateX(calc(-260px + 18px));
  width:52px;height:52px;border-radius:50%;background:var(--coffee);color:#fff;
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(43,27,18,.35);
  border:none;font-size:26px;z-index:40;
}
@media (max-width:520px){.fab{transform:none;left:auto;right:16px;}}

.search-box{
  display:flex;align-items:center;gap:8px;background:var(--paper);
  border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:12px;
}
.search-box input{border:none;background:transparent;outline:none;flex:1;font-family:'Tajawal';font-size:13.5px;color:var(--espresso);}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:14px;
  padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);
}
.card-row{display:flex;justify-content:space-between;align-items:center;}
.card-title{font-weight:700;font-size:14.5px;}
.card-sub{font-size:11.5px;color:var(--coffee-light);margin-top:2px;}
.card-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.badge-ok{background:#E7F0E7;color:var(--sage);}
.badge-warn{background:#FBF0E4;color:#9A6A21;}
.badge-danger{background:#F8E7E4;color:var(--brick);}
.card-actions{display:flex;gap:8px;margin-top:10px;}

.empty-state{text-align:center;padding:40px 20px;color:var(--coffee-light);}
.empty-state svg{margin-bottom:10px;opacity:.5;}

/* ---------- Modal/form ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(43,27,18,.45);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:var(--cream);width:100%;max-width:520px;border-radius:20px 20px 0 0;
  max-height:88vh;overflow-y:auto;padding:18px 18px 26px;
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-title{font-size:16px;font-weight:800;margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--coffee);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;border-radius:10px;border:1.4px solid var(--line);
  font-family:'Tajawal';font-size:14px;background:#fff;color:var(--espresso);outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.chip{
  padding:6px 12px;border-radius:20px;border:1.4px solid var(--line);font-size:12.5px;
  background:#fff;cursor:pointer;font-weight:600;color:var(--coffee);
}
.chip.active{background:var(--coffee);color:#fff;border-color:var(--coffee);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-actions .btn{flex:1;}
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--espresso);color:#fff;padding:10px 20px;border-radius:30px;
  font-size:13px;z-index:200;box-shadow:0 4px 14px rgba(0,0,0,.3);
  animation:fadeInOut 2.2s ease forwards;
}
@keyframes fadeInOut{0%{opacity:0;transform:translate(-50%,10px);}12%{opacity:1;transform:translate(-50%,0);}85%{opacity:1;}100%{opacity:0;}}

/* invoice / statement print */
.invoice-total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px;}
.invoice-total-row.grand{border-top:1.5px dashed var(--line);margin-top:6px;padding-top:10px;font-weight:800;font-size:15px;}
.divider{border:none;border-top:1px dashed var(--line);margin:12px 0;}

.gauge-wrap{display:flex;align-items:center;gap:14px;}
.gauge{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:14px;color:var(--espresso);}

.settings-row{display:flex;justify-content:space-between;align-items:center;padding:13px 4px;border-bottom:1px solid var(--line);}
.settings-row:last-child{border-bottom:none;}
.switch{width:42px;height:24px;border-radius:20px;background:var(--line);position:relative;cursor:pointer;flex-shrink:0;}
.switch.on{background:var(--coffee);}
.switch::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;right:3px;transition:.15s;}
.switch.on::after{right:21px;}

.tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--paper);border-radius:12px;padding:4px;border:1px solid var(--line);}
.tab{flex:1;text-align:center;padding:8px 4px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--coffee-light);cursor:pointer;}
.tab.active{background:var(--coffee);color:#fff;}

#print-area{display:none;}
@media print{
  body *{visibility:hidden;}
  #print-area, #print-area *{visibility:visible;}
  #print-area{display:block;position:absolute;top:0;right:0;width:100%;padding:16px;}
}
</style>
</head>
<body>
<div id="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-row" id="topbarRow">
      <div class="logo-badge" id="logoBadge">
        <img id="logoImg" src="" alt="شعار" style="width:100%;height:100%;object-fit:cover;border-radius:14px;">
      </div>
      <div class="brand-block">
        <p class="brand" id="brandName">شركة القهوجي</p>
        <div class="brand-sub" id="brandSub">Algahwagy &middot; إدارة المخازن والمبيعات</div>
      </div>
    </div>
  </div>

  <div class="content" id="content"></div>
  <button class="fab" id="fabBtn" style="display:none;">+</button>

  <div class="bottom-nav">
    <div class="nav-item" data-screen="dashboard"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg><span class="nav-label">الرئيسية</span></div>

    <div class="nav-item" data-screen="merchants"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg><span class="nav-label">التجار</span></div>
    <div class="nav-item" data-screen="products"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 8 12 4 4 8v8l8 4 8-4z"/><path d="M4 8l8 4 8-4M12 12v8"/></svg><span class="nav-label">المنتجات</span></div>
    <div class="nav-item" data-screen="more"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg><span class="nav-label">المزيد</span></div>
  </div>
</div>

<div id="print-area"></div>

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){
  if(!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('ar-EG',{year:'numeric',month:'2-digit',day:'2-digit'});
}
function fmtMoney(n){
  n = Number(n)||0;
  return n.toLocaleString('ar-EG',{maximumFractionDigits:2}) + ' ج.م';
}
function daysBetween(iso){
  if(!iso) return 9999;
  const d1 = new Date(iso), d2 = new Date();
  return Math.floor((d2 - d1) / (1000*60*60*24));
}

/* ---------- Default DB ---------- */
function defaultDB(){
  return {
    settings:{ shopName:'شركة القهوجي', shopSub:'Algahwagy · إدارة المخازن والمبيعات', reminderDays:15, logo:DEFAULT_LOGO },
    products:[], merchants:[], invoices:[], payments:[], production:[], offers:[]
  };
}

let DB = loadDB();
function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) return defaultDB();
    const parsed = JSON.parse(raw);
    const merged = Object.assign(defaultDB(), parsed);
    merged.settings = Object.assign(defaultDB().settings, parsed.settings||{});
    if(!merged.settings.logo) merged.settings.logo = DEFAULT_LOGO;
    if(!merged.offers) merged.offers = [];
    return merged;
  }catch(e){ return defaultDB(); }
}
function saveDB(){ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }

/* ---------- Toast ---------- */
function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

/* ---------- Modal helper ---------- */
function openModal(title, bodyHTML, onMount){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-sheet"><div class="modal-title">${title}</div><div id="modalBody">${bodyHTML}</div></div>`;
  overlay.addEventListener('click', e=>{ if(e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  if(onMount) onMount(overlay);
  return overlay;
}
function closeModal(overlay){ if(overlay) overlay.remove(); }

/* ---------- Router ---------- */
let currentScreen = 'dashboard';
let subState = {}; // holds temp state per screen (e.g. selected merchant id)

function navigate(screen, state){
  currentScreen = screen;
  subState = state || {};
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.screen === screen || (screen!=='dashboard'&&screen!=='sales'&&screen!=='merchants'&&screen!=='products'&&el.dataset.screen==='more' && ['debts','production','reports','backup','settings','reminders'].includes(screen)));
  });
  render();
  window.scrollTo(0,0);
}

document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click', ()=> navigate(el.dataset.screen));
});

/* =========================================================
   حسابات مساعدة
   ========================================================= */
function merchantBalance(mid){
  const invTotal = DB.invoices.filter(i=>i.merchantId===mid).reduce((s,i)=>s+i.total,0);
  const paidOnInv = DB.invoices.filter(i=>i.merchantId===mid).reduce((s,i)=>s+i.paidAtSale,0);
  const extraPay = DB.payments.filter(p=>p.merchantId===mid).reduce((s,p)=>s+p.amount,0);
  const totalPaid = paidOnInv + extraPay;
  return { invTotal, totalPaid, remaining: Math.max(0, invTotal - totalPaid) };
}
function merchantLastPaymentDate(mid){
  const pays = DB.payments.filter(p=>p.merchantId===mid).sort((a,b)=> new Date(b.date)-new Date(a.date));
  const invs = DB.invoices.filter(i=>i.merchantId===mid).sort((a,b)=> new Date(b.date)-new Date(a.date));
  const dates = [];
  if(pays[0]) dates.push(pays[0].date);
  if(invs[0]) dates.push(invs[0].date);
  if(!dates.length) return null;
  return dates.sort((a,b)=> new Date(b)-new Date(a))[0];
}
function lowStockProducts(){ return DB.products.filter(p=> Number(p.qty) <= Number(p.minStock)); }
function lateMerchants(days){
  days = days || DB.settings.reminderDays || 15;
  return DB.merchants.map(m=>{
    const bal = merchantBalance(m.id);
    const last = merchantLastPaymentDate(m.id);
    const d = last ? daysBetween(last) : null;
    return {m, bal, lastDate:last, d};
  }).filter(x=> x.bal.remaining > 0 && x.d !== null && x.d >= days);
}
function todaySalesTotal(){
  return DB.invoices.filter(i=>i.date === todayISO()).reduce((s,i)=>s+i.total,0);
}
function todayCollectedTotal(){
  const invPay = DB.invoices.filter(i=>i.date===todayISO()).reduce((s,i)=>s+i.paidAtSale,0);
  const extraPay = DB.payments.filter(p=>p.date===todayISO()).reduce((s,p)=>s+p.amount,0);
  return invPay + extraPay;
}
function totalDebts(){
  return DB.merchants.reduce((s,m)=> s + merchantBalance(m.id).remaining, 0);
}
function findMerchantDuplicate(name, phone){
  name = (name||'').trim(); phone = (phone||'').trim();
  return DB.merchants.find(m=>
    (phone && m.phone && m.phone.trim()===phone) ||
    (name && m.name.trim().toLowerCase() === name.toLowerCase())
  );
}

/* =========================================================
   RENDER: DASHBOARD
   ========================================================= */
function renderDashboard(){
  document.getElementById('fabBtn').style.display='none';
  const low = lowStockProducts();
  const late = lateMerchants();
  const debts = totalDebts();

  let html = `<div class="date-strip">${new Date().toLocaleDateString('ar-EG',{weekday:'long', year:'numeric', month:'long', day:'numeric'})}</div>`;

  html += `<div class="stat-grid">
    <div class="stat-card"><div class="stat-value">${fmtMoney(todaySalesTotal())}</div><div class="stat-label">مبيعات اليوم</div></div>
    <div class="stat-card"><div class="stat-value">${fmtMoney(todayCollectedTotal())}</div><div class="stat-label">المحصّل اليوم</div></div>
    <div class="stat-card"><div class="stat-value">${fmtMoney(debts)}</div><div class="stat-label">ديون التجار</div></div>
    <div class="stat-card"><div class="stat-value">${DB.merchants.length}</div><div class="stat-label">عدد التجار</div></div>
    <div class="stat-card wide"><div><div class="stat-value">${DB.products.length}</div><div class="stat-label">عدد المنتجات</div></div>
      <div>${ICONS.products}</div>
    </div>
  </div>`;

  if(low.length){
    html += `<div class="alert-box warn"><div>${ICONS.bell}</div><div>
      <div class="alert-title">تنبيه: منتجات قليلة المخزون (${low.length})</div>
      <div class="alert-body">${low.slice(0,3).map(p=>`${p.name} ${p.weight} — الكمية ${p.qty}`).join('، ')}${low.length>3?' ...':''}</div>
    </div></div>`;
  }
  if(late.length){
    html += `<div class="alert-box danger"><div>${ICONS.bell}</div><div>
      <div class="alert-title">لديك تجار عليهم مبالغ مستحقة (${late.length})</div>
      <div class="alert-body">${late.slice(0,3).map(x=>`${x.m.name} — ${fmtMoney(x.bal.remaining)}`).join('، ')}${late.length>3?' ...':''}</div>
    </div></div>`;
  }

  html += `<div class="menu-grid">
    ${menuBtn('sales','المبيعات والفواتير','sales')}
    ${menuBtn('products','المنتجات والمخزون','products')}
    ${menuBtn('merchants','التجار والديون','merchants')}
    ${menuBtn('debts','الدفعات والتحصيل','payments')}
    ${menuBtn('reports','التقارير','reports')}
    ${menuBtn('production','الإنتاج والتحميص','roast')}
    ${menuBtn('offers','العروض والتخفيضات','offers')}
    ${menuBtn('reminders','التذكيرات','bell')}
    ${menuBtn('settings','الإعدادات','settings')}
  </div>`;

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('.menu-btn').forEach(el=> el.addEventListener('click', ()=> navigate(el.dataset.go)));
}
function menuBtn(go,label,icon){
  return `<div class="menu-btn" data-go="${go}"><div class="menu-icon">${ICONS[icon]}</div><div class="menu-label">${label}</div></div>`;
}

function renderProducts(){
  const fab = document.getElementById('fabBtn');
  fab.style.display='flex'; fab.onclick = ()=> openProductForm();

  let list = DB.products.slice().sort((a,b)=> b.dateAdded.localeCompare(a.dateAdded));
  const q = (subState.query||'').trim();
  if(q) list = list.filter(p=> p.name.includes(q) || p.weight.includes(q));

  let html = `<div class="section-header"><h2>المنتجات والمخزون</h2></div>
  <div class="search-box"><span>${searchIcon()}</span><input id="prodSearch" placeholder="ابحث باسم الصنف أو الوزن" value="${q}"></div>`;

  if(!list.length){
    html += emptyState('لا توجد منتجات بعد', 'اضغط + لإضافة أول منتج');
  } else {
    html += list.map(p=>{
      const low = Number(p.qty) <= Number(p.minStock);
      return `<div class="card">
        <div class="card-row">
          <div style="display:flex;gap:10px;align-items:center;">
            ${p.photo ? `<img src="${p.photo}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">` : `<div style="width:44px;height:44px;border-radius:10px;background:var(--gold-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;">${ICONS.products}</div>`}
            <div><div class="card-title">${p.name} — ${p.weight}</div>
            <div class="card-sub">شراء ${fmtMoney(p.buyPrice)} · بيع ${fmtMoney(p.sellPrice)} · أُضيف ${fmtDate(p.dateAdded)}</div></div>
          </div>
          <div class="card-badge ${low?'badge-danger':'badge-ok'}">${p.qty}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-outline btn-sm" data-edit="${p.id}">تعديل</button>
          <button class="btn btn-danger btn-sm" data-del="${p.id}">حذف</button>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('content').innerHTML = html;
  document.getElementById('prodSearch').addEventListener('input', e=>{ subState.query = e.target.value; renderProducts(); });
  document.querySelectorAll('[data-edit]').forEach(el=> el.addEventListener('click', ()=> openProductForm(el.dataset.edit)));
  document.querySelectorAll('[data-del]').forEach(el=> el.addEventListener('click', ()=>{
    if(confirm('هل تريد حذف هذا المنتج؟')){
      DB.products = DB.products.filter(p=>p.id!==el.dataset.del); saveDB(); renderProducts(); toast('تم الحذف');
    }
  }));
}
function searchIcon(){ return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8B5E3C" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>'; }
function emptyState(title,sub){
  return `<div class="empty-state">${ICONS.empty}<div style="font-weight:700;margin-top:6px;">${title}</div><div style="font-size:12.5px;margin-top:2px;">${sub}</div></div>`;
}

function openProductForm(id){
  const p = id ? DB.products.find(x=>x.id===id) : null;
  const body = `
    <div class="field"><label>اسم الصنف</label><input id="f_name" value="${p?p.name:'البن السادة'}"></div>
    <div class="field"><label>صورة الصنف (اختياري)</label>
      <div style="display:flex;align-items:center;gap:12px;">
        <div id="photoPreviewWrap" style="width:60px;height:60px;border-radius:12px;border:1px solid var(--line);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--gold-light);">
          ${p&&p.photo ? `<img id="photoPreview" src="${p.photo}" style="width:100%;height:100%;object-fit:cover;">` : `<span id="photoPreview">${ICONS.products}</span>`}
        </div>
        <input type="file" id="f_photo" accept="image/*" style="flex:1;">
      </div>
    </div>
    <div class="field"><label>الوزن</label>
      <div class="chip-row" id="weightChips">
        ${WEIGHT_PRESETS.map(w=>`<div class="chip ${p&&p.weight===w.label?'active':''}" data-w="${w.label}">${w.label}</div>`).join('')}
        <div class="chip ${p && !WEIGHT_PRESETS.some(w=>w.label===p.weight) ? 'active':''}" data-w="custom">وزن آخر</div>
      </div>
      <input id="f_weight_custom" placeholder="اكتب الوزن (مثال: 200 جم)" style="margin-top:8px;display:${p && !WEIGHT_PRESETS.some(w=>w.label===p.weight)?'block':'none'}" value="${p && !WEIGHT_PRESETS.some(w=>w.label===p.weight)?p.weight:''}">
    </div>
    <div class="field-row">
      <div class="field"><label>سعر الشراء</label><input id="f_buy" type="number" value="${p?p.buyPrice:''}"></div>
      <div class="field"><label>سعر البيع</label><input id="f_sell" type="number" value="${p?p.sellPrice:''}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>الكمية الحالية</label><input id="f_qty" type="number" value="${p?p.qty:''}"></div>
      <div class="field"><label>الحد الأدنى للمخزون</label><input id="f_min" type="number" value="${p?p.minStock:'5'}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">${p?'حفظ التعديل':'إضافة المنتج'}</button>
    </div>`;
  const overlay = openModal(p?'تعديل منتج':'إضافة منتج جديد', body, ov=>{
    let selectedWeight = p ? (WEIGHT_PRESETS.some(w=>w.label===p.weight)?p.weight:'custom') : WEIGHT_PRESETS[2].label;
    let photoData = p && p.photo ? p.photo : null;
    ov.querySelector('#f_photo').addEventListener('change', e=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        photoData = reader.result;
        ov.querySelector('#photoPreviewWrap').innerHTML = `<img src="${photoData}" style="width:100%;height:100%;object-fit:cover;">`;
      };
      reader.readAsDataURL(file);
    });
    ov.querySelectorAll('#weightChips .chip').forEach(c=>{
      c.addEventListener('click', ()=>{
        ov.querySelectorAll('#weightChips .chip').forEach(x=>x.classList.remove('active'));
        c.classList.add('active');
        selectedWeight = c.dataset.w;
        ov.querySelector('#f_weight_custom').style.display = (selectedWeight==='custom')?'block':'none';
      });
    });
    ov.querySelector('#cancelBtn').addEventListener('click', ()=> closeModal(ov));
    ov.querySelector('#saveBtn').addEventListener('click', ()=>{
      const name = ov.querySelector('#f_name').value.trim();
      let weight = selectedWeight==='custom' ? ov.querySelector('#f_weight_custom').value.trim() : selectedWeight;
      const buyPrice = parseFloat(ov.querySelector('#f_buy').value)||0;
      const sellPrice = parseFloat(ov.querySelector('#f_sell').value)||0;
      const qty = parseFloat(ov.querySelector('#f_qty').value)||0;
      const minStock = parseFloat(ov.querySelector('#f_min').value)||0;
      if(!name || !weight){ toast('يرجى إدخال اسم الصنف والوزن'); return; }
      if(p){
        Object.assign(p, {name,weight,buyPrice,sellPrice,qty,minStock,photo:photoData});
      } else {
        DB.products.push({id:uid(), name, weight, buyPrice, sellPrice, qty, minStock, photo:photoData, dateAdded: todayISO()});
      }
      saveDB(); closeModal(ov); renderProducts(); toast('تم الحفظ بنجاح');
    });
  });
}

/* =========================================================
   RENDER: MERCHANTS
   ========================================================= */
function renderMerchants(){
  const fab = document.getElementById('fabBtn');
  fab.style.display='flex'; fab.onclick = ()=> openMerchantForm();

  let list = DB.merchants.slice();
  const q = (subState.query||'').trim();
  if(q) list = list.filter(m=> m.name.includes(q) || (m.phone||'').includes(q));

  let html = `<div class="section-header"><h2>التجار والديون</h2></div>
  <div class="search-box"><span>${searchIcon()}</span><input id="merSearch" placeholder="ابحث بالاسم أو الهاتف" value="${q}"></div>`;

  if(!list.length){
    html += emptyState('لا يوجد تجار بعد', 'اضغط + لإضافة تاجر جديد');
  } else {
    html += list.map(m=>{
      const bal = merchantBalance(m.id);
      const badge = bal.remaining>0 ? `<div class="card-badge badge-danger">${fmtMoney(bal.remaining)}</div>` : `<div class="card-badge badge-ok">لا يوجد دين</div>`;
      return `<div class="card">
        <div class="card-row">
          <div><div class="card-title">${m.name}</div><div class="card-sub">${m.phone||'بدون رقم'}</div></div>
          ${badge}
        </div>
        <div class="card-actions">
          <button class="btn btn-outline btn-sm" data-stmt="${m.id}">كشف حساب</button>
          <button class="btn btn-gold btn-sm" data-pay="${m.id}">إضافة دفعة</button>
          <button class="btn btn-outline btn-sm" data-edit="${m.id}">تعديل</button>
          <button class="btn btn-danger btn-sm" data-delmer="${m.id}">حذف</button>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('content').innerHTML = html;
  document.getElementById('merSearch').addEventListener('input', e=>{ subState.query = e.target.value; renderMerchants(); });
  document.querySelectorAll('[data-edit]').forEach(el=> el.addEventListener('click', ()=> openMerchantForm(el.dataset.edit)));
  document.querySelectorAll('[data-pay]').forEach(el=> el.addEventListener('click', ()=> openPaymentForm(el.dataset.pay)));
  document.querySelectorAll('[data-stmt]').forEach(el=> el.addEventListener('click', ()=> navigate('statement', {merchantId: el.dataset.stmt})));
  document.querySelectorAll('[data-delmer]').forEach(el=> el.addEventListener('click', ()=>{
    const mid = el.dataset.delmer;
    const m = DB.merchants.find(x=>x.id===mid);
    const bal = merchantBalance(mid);
    let msg = `هل تريد حذف التاجر "${m.name}"؟`;
    if(bal.remaining>0) msg += `\nتنبيه: عليه رصيد متبقي ${fmtMoney(bal.remaining)} — سيتم حذف بياناته فقط مع الاحتفاظ بسجل الفواتير والدفعات القديمة.`;
    if(!confirm(msg)) return;
    DB.merchants = DB.merchants.filter(x=>x.id!==mid);
    saveDB(); renderMerchants(); toast('تم حذف التاجر');
  }));
}

function openMerchantForm(id){
  const m = id ? DB.merchants.find(x=>x.id===id) : null;
  const body = `
    <div class="field"><label>اسم التاجر</label><input id="f_name" value="${m?m.name:''}"></div>
    <div class="field"><label>رقم الهاتف</label><input id="f_phone" value="${m?m.phone||'':''}"></div>
    <div class="field"><label>العنوان</label><input id="f_addr" value="${m?m.address||'':''}"></div>
    <div class="field"><label>الحد الائتماني</label><input id="f_credit" type="number" value="${m?m.creditLimit||'':''}"></div>
    <div class="field"><label>ملاحظات</label><textarea id="f_notes" rows="2">${m?m.notes||'':''}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">${m?'حفظ التعديل':'إضافة التاجر'}</button>
    </div>`;
  const overlay = openModal(m?'تعديل بيانات تاجر':'إضافة تاجر جديد', body, ov=>{
    ov.querySelector('#cancelBtn').addEventListener('click', ()=> closeModal(ov));
    ov.querySelector('#saveBtn').addEventListener('click', ()=>{
      const name = ov.querySelector('#f_name').value.trim();
      const phone = ov.querySelector('#f_phone').value.trim();
      const address = ov.querySelector('#f_addr').value.trim();
      const creditLimit = parseFloat(ov.querySelector('#f_credit').value)||0;
      const notes = ov.querySelector('#f_notes').value.trim();
      if(!name){ toast('يرجى إدخال اسم التاجر'); return; }
      if(!m){
        const dup = findMerchantDuplicate(name, phone);
        if(dup){ toast('هذا التاجر موجود بالفعل — تم استخدام حسابه الحالي'); closeModal(ov); renderMerchants(); return; }
        DB.merchants.push({id:uid(), name, phone, address, creditLimit, notes});
      } else {
        Object.assign(m, {name,phone,address,creditLimit,notes});
      }
      saveDB(); closeModal(ov); renderMerchants(); toast('تم الحفظ بنجاح');
    });
  });
}

function openPaymentForm(merchantId){
  const m = DB.merchants.find(x=>x.id===merchantId);
  const bal = merchantBalance(merchantId);
  const body = `
    <div class="card" style="margin-bottom:14px;"><div class="card-title">${m.name}</div><div class="card-sub">المتبقي عليه حالياً: ${fmtMoney(bal.remaining)}</div></div>
    <div class="field"><label>المبلغ المدفوع</label><input id="f_amount" type="number"></div>
    <div class="field"><label>التاريخ</label><input id="f_date" type="date" value="${todayISO()}"></div>
    <div class="field"><label>ملاحظة</label><input id="f_note" placeholder="اختياري"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">حفظ الدفعة</button>
    </div>`;
  const overlay = openModal('إضافة دفعة', body, ov=>{
    ov.querySelector('#cancelBtn').addEventListener('click', ()=> closeModal(ov));
    ov.querySelector('#saveBtn').addEventListener('click', ()=>{
      const amount = parseFloat(ov.querySelector('#f_amount').value)||0;
      const date = ov.querySelector('#f_date').value || todayISO();
      const note = ov.querySelector('#f_note').value.trim();
      if(amount<=0){ toast('يرجى إدخال مبلغ صحيح'); return; }
      DB.payments.push({id:uid(), merchantId, amount, date, note});
      saveDB(); closeModal(ov);
      if(currentScreen==='merchants') renderMerchants(); else render();
      toast('تم تسجيل الدفعة');
    });
  });
}

/* =========================================================
   RENDER: STATEMENT (كشف حساب تاجر)
   ========================================================= */
function renderStatement(){
  const m = DB.merchants.find(x=>x.id===subState.merchantId);
  document.getElementById('fabBtn').style.display='none';
  if(!m){ navigate('merchants'); return; }
  const invs = DB.invoices.filter(i=>i.merchantId===m.id).sort((a,b)=> b.date.localeCompare(a.date));
  const pays = DB.payments.filter(p=>p.merchantId===m.id).sort((a,b)=> b.date.localeCompare(a.date));
  const bal = merchantBalance(m.id);

  let html = `<div class="section-header"><button class="btn btn-outline btn-sm" id="backBtn">رجوع</button><h2>كشف حساب: ${m.name}</h2></div>`;
  html += `<div class="stat-grid">
    <div class="stat-card"><div class="stat-value">${fmtMoney(bal.invTotal)}</div><div class="stat-label">إجمالي المشتريات</div></div>
    <div class="stat-card"><div class="stat-value">${fmtMoney(bal.totalPaid)}</div><div class="stat-label">إجمالي المدفوع</div></div>
    <div class="stat-card wide"><div class="stat-value">${fmtMoney(bal.remaining)}</div><div class="stat-label">الرصيد المتبقي</div></div>
  </div>`;
  html += `<button class="btn btn-gold btn-block" id="printStmt" style="margin-bottom:14px;">طباعة كشف الحساب</button>`;

  html += `<h3 style="font-size:14px;margin:10px 0 8px;">الفواتير</h3>`;
  html += invs.length ? invs.map(i=>`<div class="card"><div class="card-row"><div><div class="card-title">فاتورة ${fmtDate(i.date)}</div><div class="card-sub">مدفوع ${fmtMoney(i.paidAtSale)} من ${fmtMoney(i.total)}</div></div><div class="card-badge ${i.total-i.paidAtSale>0?'badge-danger':'badge-ok'}">${fmtMoney(i.total)}</div></div><div class="card-actions"><button class="btn btn-outline btn-sm" data-editpaid="${i.id}">تعديل المبلغ المدفوع</button></div></div>`).join('') : emptyState('لا توجد فواتير','');
  html += `<h3 style="font-size:14px;margin:14px 0 8px;">الدفعات</h3>`;
  html += pays.length ? pays.map(p=>`<div class="card"><div class="card-row"><div><div class="card-title">${fmtMoney(p.amount)}</div><div class="card-sub">${fmtDate(p.date)} ${p.note?'· '+p.note:''}</div></div></div><div class="card-actions"><button class="btn btn-outline btn-sm" data-editpay="${p.id}">تعديل</button><button class="btn btn-danger btn-sm" data-delpay="${p.id}">حذف</button></div></div>`).join('') : emptyState('لا توجد دفعات إضافية','');

  document.getElementById('content').innerHTML = html;
  document.getElementById('backBtn').addEventListener('click', ()=> navigate('merchants'));
  document.getElementById('printStmt').addEventListener('click', ()=> printStatement(m, invs, pays, bal));
  document.querySelectorAll('[data-editpaid]').forEach(el=> el.addEventListener('click', ()=> openEditInvoicePaid(el.dataset.editpaid)));
  document.querySelectorAll('[data-editpay]').forEach(el=> el.addEventListener('click', ()=> openEditPaymentForm(el.dataset.editpay)));
  document.querySelectorAll('[data-delpay]').forEach(el=> el.addEventListener('click', ()=>{
    if(confirm('هل تريد حذف هذه الدفعة؟')){
      DB.payments = DB.payments.filter(p=>p.id!==el.dataset.delpay);
      saveDB(); renderStatement(); toast('تم حذف الدفعة');
    }
  }));
}

function openEditInvoicePaid(invId){
  const inv = DB.invoices.find(i=>i.id===invId);
  const body = `
    <div class="card-sub" style="margin-bottom:10px;">إجمالي الفاتورة: ${fmtMoney(inv.total)}</div>
    <div class="field"><label>المبلغ المدفوع</label><input id="f_paidedit" type="number" value="${inv.paidAtSale}"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">حفظ</button>
    </div>`;
  const ov = openModal('تعديل المبلغ المدفوع للفاتورة', body, o=>{
    o.querySelector('#cancelBtn').addEventListener('click', ()=> closeModal(o));
    o.querySelector('#saveBtn').addEventListener('click', ()=>{
      let val = parseFloat(o.querySelector('#f_paidedit').value)||0;
      val = Math.max(0, Math.min(val, inv.total));
      inv.paidAtSale = val;
      saveDB(); closeModal(o); renderStatement(); toast('تم تحديث المبلغ المدفوع');
    });
  });
}

function openEditPaymentForm(payId){
  const p = DB.payments.find(x=>x.id===payId);
  const body = `
    <div class="field"><label>المبلغ</label><input id="f_amount" type="number" value="${p.amount}"></div>
    <div class="field"><label>التاريخ</label><input id="f_date" type="date" value="${p.date}"></div>

      <button class="btn btn-outline" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">حفظ التعديل</button>
    </div>`;
  const ov = openModal('تعديل الدفعة', body, o=>{
    o.querySelector('#cancelBtn').addEventListener('click', ()=> closeModal(o));
    o.querySelector('#saveBtn').addEventListener('click', ()=>{
      const amount = parseFloat(o.querySelector('#f_amount').value)||0;
      const date = o.querySelector('#f_date').value || p.date;
      const note = o.querySelector('#f_note').value.trim();
      if(amount<=0){ toast('يرجى إدخال مبلغ صحيح'); return; }
      Object.assign(p, {amount, date, note});
      saveDB(); closeModal(o); renderStatement(); toast('تم حفظ التعديل');
    });

}

function printStatement(m, invs, pays, bal){
  const area = document.getElementById('print-area');
  area.innerHTML = `
    <h2>${DB.settings.shopName}</h2>
    <p>كشف حساب التاجر: ${m.name} — ${m.phone||''}</p>
    <p>تاريخ الطباعة: ${fmtDate(todayISO())}</p>
    <hr>
    <h3>الفواتير</h3>
    <table border="1" cellpadding="6" style="width:100%;border-collapse:collapse;">
      <tr><th>التاريخ</th><th>الإجمالي</th><th>المدفوع عند البيع</th></tr>
      ${invs.map(i=>`<tr><td>${fmtDate(i.date)}</td><td>${fmtMoney(i.total)}</td><td>${fmtMoney(i.paidAtSale)}</td></tr>`).join('')}

    <table border="1" cellpadding="6" style="width:100%;border-collapse:collapse;">

/* =========================================================
   RENDER: SALES (فواتير البيع)
   ========================================================= */
function renderSales(){
  const fab = document.getElementById('fabBtn');
  fab.style.display='flex'; fab.onclick = ()=> openNewInvoice();

  let list = DB.invoices.slice().sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  let html = `<div class="section-header"><h2>المبيعات والفواتير</h2></div>`;
  if(!list.length){
    html += emptyState('لا توجد فواتير بعد', 'اضغط + لإنشاء فاتورة بيع جديدة');
  } else {
    html += list.map(i=>{
      const mer = DB.merchants.find(m=>m.id===i.merchantId);
      const remaining = i.total - i.paidAtSale;
      return `<div class="card">
        <div class="card-row">
          <div><div class="card-title">${mer?mer.name:'عميل نقدي'}</div><div class="card-sub">${fmtDate(i.date)} · ${i.items.length} صنف</div></div>
          <div class="card-badge ${remaining>0?'badge-warn':'badge-ok'}">${fmtMoney(i.total)}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-outline btn-sm" data-view="${i.id}">عرض / طباعة</button>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('[data-view]').forEach(el=> el.addEventListener('click', ()=> viewInvoice(el.dataset.view)));
}

function viewInvoice(id){
  const inv = DB.invoices.find(i=>i.id===id);
  const mer = DB.merchants.find(m=>m.id===inv.merchantId);
  const body = `
    <div class="card-sub" style="margin-bottom:8px;">${fmtDate(inv.date)} — ${mer?mer.name:'عميل نقدي'}</div>
    ${inv.items.map(it=>`<div class="invoice-total-row"><span>${it.name} (${it.weight}) × ${it.qty}</span><span>${fmtMoney(it.lineTotal)}</span></div>`).join('')}
    ${inv.discountAmount>0?`<div class="invoice-total-row"><span>الإجمالي قبل الخصم</span><span>${fmtMoney(inv.subtotal)}</span></div><div class="invoice-total-row"><span>الخصم</span><span>- ${fmtMoney(inv.discountAmount)}</span></div>`:''}
    <div class="invoice-total-row"><span>الإجمالي</span><span>${fmtMoney(inv.total)}</span></div>
    <div class="invoice-total-row"><span>المدفوع</span><span>${fmtMoney(inv.paidAtSale)}</span></div>
    <div class="invoice-total-row grand"><span>المتبقي</span><span>${fmtMoney(inv.total-inv.paidAtSale)}</span></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="closeBtn">إغلاق</button>
      <button class="btn btn-gold" id="printBtn">طباعة</button>
    </div>`;
  const ov = openModal('تفاصيل الفاتورة', body, o=>{
    o.querySelector('#closeBtn').addEventListener('click', ()=> closeModal(o));
    o.querySelector('#printBtn').addEventListener('click', ()=> printInvoice(inv, mer));
  });
}

    <h2>${DB.settings.shopName}</h2>
    <p>فاتورة بيع — ${fmtDate(inv.date)}</p>
    <p>التاجر: ${mer?mer.name:'عميل نقدي'} ${mer&&mer.phone?'— '+mer.phone:''}</p>
    <hr>
    <table border="1" cellpadding="6" style="width:100%;border-collapse:collapse;">
      <tr><th>الصنف</th><th>الوزن</th><th>الكمية</th><th>الإجمالي</th></tr>

    </table>
    <hr>
    ${inv.discountAmount>0?`<p><b>الإجمالي قبل الخصم:</b> ${fmtMoney(inv.subtotal)}</p><p><b>الخصم:</b> - ${fmtMoney(inv.discountAmount)}</p>`:''}
    <p><b>الإجمالي:</b> ${fmtMoney(inv.total)}</p>
    <p><b>المدفوع:</b> ${fmtMoney(inv.paidAtSale)}</p>
    <p><b>المتبقي:</b> ${fmtMoney(inv.total-inv.paidAtSale)}</p>

}

function openNewInvoice(){
  if(!DB.products.length){ toast('أضف منتجات أولاً قبل إنشاء فاتورة'); return; }
  let cart = [];
  let selectedMerchant = null;
  let discountType = 'none'; // none | percent | amount
  let discountValue = 0;
  let appliedOfferId = null;
  const activeOffers = (DB.offers||[]).filter(o=>o.active);

  const body = `
    <div class="field">
      <label>التاجر</label>
      <input id="merSearchInv" placeholder="ابحث بالاسم أو الهاتف، أو اتركه لعميل نقدي">
      <div id="merResults" style="margin-top:6px;"></div>
      <div id="merSelected" style="margin-top:6px;"></div>
    </div>
    <hr class="divider">
    <div class="field-row">
      <div class="field"><label>المنتج</label>
        <select id="f_product">${DB.products.map(p=>`<option value="${p.id}">${p.name} — ${p.weight} (متوفر ${p.qty})</option>`).join('')}</select>
      </div>
      <div class="field" style="max-width:90px;"><label>الكمية</label><input id="f_qty" type="number" value="1" min="1"></div>
    </div>
    <button class="btn btn-outline btn-block" id="addItemBtn" style="margin-bottom:10px;">إضافة إلى الفاتورة</button>
    <div id="cartList"></div>
    <hr class="divider">
    <div class="field">
      <label>العروض والتخفيضات</label>
      ${activeOffers.length ? `<div class="chip-row" id="offerChips">
        <div class="chip active" data-offer="none">بدون خصم</div>
        ${activeOffers.map(o=>`<div class="chip" data-offer="${o.id}">${o.title} (${o.discountType==='percent'?o.value+'%':fmtMoney(o.value)})</div>`).join('')}
        <div class="chip" data-offer="custom">خصم يدوي</div>
      </div>` : `<div class="chip-row" id="offerChips"><div class="chip active" data-offer="none">بدون خصم</div><div class="chip" data-offer="custom">خصم يدوي</div></div>`}
      <div id="customDiscountWrap" style="display:none;margin-top:8px;">
        <div class="field-row">
          <div class="field"><label>نوع الخصم</label>
            <select id="f_disc_type"><option value="percent">نسبة %</option><option value="amount">مبلغ ثابت</option></select>
          </div>
          <div class="field"><label>القيمة</label><input id="f_disc_val" type="number" value="0"></div>
        </div>
      </div>
    </div>
    <div class="invoice-total-row"><span>الإجمالي قبل الخصم</span><span id="subtotalDisplay">0 ج.م</span></div>
    <div class="invoice-total-row" id="discountDisplayRow" style="display:none;"><span>الخصم</span><span id="discountDisplay">0 ج.م</span></div>
    <div class="invoice-total-row grand"><span>الإجمالي النهائي</span><span id="cartTotal">0 ج.م</span></div>
    <div class="field" style="margin-top:10px;"><label>طريقة الدفع</label>
      <div class="chip-row">
        <div class="chip active" data-pay="cash">نقدي</div>
        <div class="chip" data-pay="credit">آجل</div>
        <div class="chip" data-pay="partial">جزء نقدي وجزء آجل</div>
      </div>
    </div>
    <div class="field" id="paidWrap" style="display:none;"><label>المبلغ المدفوع الآن</label><input id="f_paid" type="number" value="0"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">حفظ الفاتورة</button>
    </div>`;

  const ov = openModal('فاتورة بيع جديدة', body, o=>{
    let payMode = 'cash';
    function computeTotals(){
      const subtotal = cart.reduce((s,c)=>s+c.lineTotal,0);
      let discountAmount = 0;
      if(discountType==='percent') discountAmount = subtotal * (discountValue/100);
      else if(discountType==='amount') discountAmount = discountValue;
      discountAmount = Math.max(0, Math.min(discountAmount, subtotal));
      const total = subtotal - discountAmount;
      return {subtotal, discountAmount, total};
    }
    function renderCart(){
      const list = o.querySelector('#cartList');
      list.innerHTML = cart.length ? cart.map((c,idx)=>`<div class="invoice-total-row"><span>${c.name} (${c.weight}) × ${c.qty}</span><span>${fmtMoney(c.lineTotal)} <a data-rm="${idx}" style="color:#A6402F;cursor:pointer;margin-right:8px;">حذف</a></span></div>`).join('') : '<div class="card-sub">لم تتم إضافة أصناف بعد</div>';
      const {subtotal, discountAmount, total} = computeTotals();
      o.querySelector('#subtotalDisplay').textContent = fmtMoney(subtotal);
      const discRow = o.querySelector('#discountDisplayRow');
      if(discountAmount>0){ discRow.style.display='flex'; o.querySelector('#discountDisplay').textContent = '- ' + fmtMoney(discountAmount); }
      else { discRow.style.display='none'; }
      o.querySelector('#cartTotal').textContent = fmtMoney(total);
      list.querySelectorAll('[data-rm]').forEach(el=> el.addEventListener('click', ()=>{ cart.splice(el.dataset.rm,1); renderCart(); }));
      if(payMode==='cash') o.querySelector('#f_paid') && (o.querySelector('#f_paid').value = total);
    }
    o.querySelector('#addItemBtn').addEventListener('click', ()=>{
      const pid = o.querySelector('#f_product').value;
      const qty = parseFloat(o.querySelector('#f_qty').value)||0;
      const p = DB.products.find(x=>x.id===pid);
      if(!p || qty<=0){ toast('اختر منتجًا وكمية صحيحة'); return; }
      if(qty > p.qty){ toast('الكمية المطلوبة أكبر من المتوفر بالمخزون'); return; }
      cart.push({productId:p.id, name:p.name, weight:p.weight, qty, unitPrice:p.sellPrice, lineTotal: qty*p.sellPrice});
      renderCart();
    });
    // offers / discount chips
    o.querySelectorAll('#offerChips .chip').forEach(c=> c.addEventListener('click', ()=>{
      o.querySelectorAll('#offerChips .chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      const val = c.dataset.offer;
      const customWrap = o.querySelector('#customDiscountWrap');
      if(val==='none'){ discountType='none'; discountValue=0; appliedOfferId=null; customWrap.style.display='none'; }
      else if(val==='custom'){ discountType='percent'; discountValue = parseFloat(o.querySelector('#f_disc_val')?.value)||0; appliedOfferId=null; customWrap.style.display='block'; }
      else {
        const offer = activeOffers.find(x=>x.id===val);
        discountType = offer.discountType; discountValue = offer.value; appliedOfferId = offer.id;
        customWrap.style.display='none';
      }
      renderCart();
    }));
    const discTypeSel = o.querySelector('#f_disc_type');
    const discValInput = o.querySelector('#f_disc_val');
    if(discTypeSel) discTypeSel.addEventListener('change', ()=>{ discountType = discTypeSel.value; renderCart(); });
    if(discValInput) discValInput.addEventListener('input', ()=>{ discountValue = parseFloat(discValInput.value)||0; renderCart(); });
    // merchant search
    const merInput = o.querySelector('#merSearchInv');
    merInput.addEventListener('input', ()=>{
      const q = merInput.value.trim();
      const box = o.querySelector('#merResults');
      if(!q){ box.innerHTML=''; return; }
      const matches = DB.merchants.filter(m=> m.name.includes(q) || (m.phone||'').includes(q)).slice(0,5);
      box.innerHTML = matches.map(m=>`<div class="chip" data-pick="${m.id}" style="display:inline-block;margin-left:6px;">${m.name}</div>`).join('') || '<div class="card-sub">لا يوجد تاجر مطابق — يمكنك إضافته من شاشة التجار أو المتابعة كعميل نقدي</div>';
      box.querySelectorAll('[data-pick]').forEach(el=> el.addEventListener('click', ()=>{
        selectedMerchant = DB.merchants.find(m=>m.id===el.dataset.pick);
        o.querySelector('#merSelected').innerHTML = `<span class="card-badge badge-ok">تم اختيار: ${selectedMerchant.name}</span>`;
        merInput.value=''; box.innerHTML='';
      }));
    });
    o.querySelectorAll('[data-pay]').forEach(c=> c.addEventListener('click', ()=>{
      o.querySelectorAll('[data-pay]').forEach(x=>x.classList.remove('active'));
      c.classList.add('active'); payMode = c.dataset.pay;
      const wrap = o.querySelector('#paidWrap');
      const {total} = computeTotals();
      if(payMode==='cash'){ wrap.style.display='none'; }
      else if(payMode==='credit'){ wrap.style.display='none'; }
      else { wrap.style.display='block'; o.querySelector('#f_paid').value = 0; }
    }));
    o.querySelector('#cancelBtn').addEventListener('click', ()=> closeModal(o));
    o.querySelector('#saveBtn').addEventListener('click', ()=>{
      if(!cart.length){ toast('أضف صنفًا واحدًا على الأقل'); return; }
      const {subtotal, discountAmount, total} = computeTotals();
      let paidAtSale = 0;
      if(payMode==='cash') paidAtSale = total;
      else if(payMode==='credit') paidAtSale = 0;
      else paidAtSale = parseFloat(o.querySelector('#f_paid').value)||0;

      // deduct stock
      cart.forEach(c=>{
        const p = DB.products.find(x=>x.id===c.productId);
        if(p) p.qty = Math.max(0, Number(p.qty) - Number(c.qty));
      });
      DB.invoices.push({
        id:uid(), merchantId: selectedMerchant?selectedMerchant.id:null,
        date: todayISO(), items: cart, subtotal, discountType, discountValue, discountAmount, offerId: appliedOfferId,
        total, paidAtSale, paymentType: payMode
      });
      saveDB(); closeModal(o); renderSales(); toast('تم حفظ الفاتورة وخصم المخزون');
    });
    renderCart();
  });
}

/* =========================================================
   RENDER: PRODUCTION / ROASTING
   ========================================================= */
function renderProduction(){
  const fab = document.getElementById('fabBtn');
  fab.style.display='flex'; fab.onclick = ()=> openProductionForm();

  const rawTotal = DB.production.reduce((s,p)=>s+p.rawQty,0) - DB.production.reduce((s,p)=>s+p.rawQty,0); // raw is consumed at roast time
  const roastedTotal = DB.production.reduce((s,p)=>s+p.roastedQty,0);
  const avgLoss = DB.production.length ? (DB.production.reduce((s,p)=>s+p.lossPercent,0)/DB.production.length) : 0;

  let html = `<div class="section-header"><h2>الإنتاج والتحميص</h2></div>`;
  html += `<div class="card" style="margin-bottom:14px;">
    <div class="gauge-wrap">
      <div class="gauge" style="background:conic-gradient(var(--brick) ${Math.min(avgLoss,100)}%, var(--gold-light) 0);">${avgLoss.toFixed(1)}%</div>
      <div><div class="card-title">متوسط نسبة الفاقد</div><div class="card-sub">إجمالي البن المحمص: ${roastedTotal} جم/كجم حسب الوحدة المدخلة</div></div>
    </div>
  </div>`;

  html += DB.production.length ? DB.production.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(p=>`
    <div class="card"><div class="card-row">
      <div><div class="card-title">${fmtDate(p.date)}</div><div class="card-sub">خام: ${p.rawQty} ← محمص: ${p.roastedQty}</div></div>
      <div class="card-badge ${p.lossPercent>20?'badge-danger':'badge-ok'}">فاقد ${p.lossPercent.toFixed(1)}%</div>
    </div></div>`).join('') : emptyState('لا توجد عمليات تحميص مسجلة بعد','اضغط + لتسجيل عملية تحميص جديدة');

  document.getElementById('content').innerHTML = html;
}
function openProductionForm(){
  const body = `
    <div class="field"><label>كمية البن الخام (جم/كجم)</label><input id="f_raw" type="number"></div>
    <div class="field"><label>كمية البن بعد التحميص</label><input id="f_roasted" type="number"></div>
    <div class="field"><label>التاريخ</label><input id="f_date" type="date" value="${todayISO()}"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">حفظ</button>
    </div>`;
  const ov = openModal('تسجيل عملية تحميص', body, o=>{
    o.querySelector('#cancelBtn').addEventListener('click', ()=> closeModal(o));
    o.querySelector('#saveBtn').addEventListener('click', ()=>{
      const rawQty = parseFloat(o.querySelector('#f_raw').value)||0;
      const roastedQty = parseFloat(o.querySelector('#f_roasted').value)||0;
      const date = o.querySelector('#f_date').value || todayISO();
      if(rawQty<=0 || roastedQty<=0){ toast('يرجى إدخال كميات صحيحة'); return; }
      const lossPercent = ((rawQty-roastedQty)/rawQty)*100;
      DB.production.push({id:uid(), rawQty, roastedQty, lossPercent, date});
      saveDB(); closeModal(o); renderProduction(); toast('تم حفظ عملية التحميص');
    });
  });
}

/* =========================================================
   RENDER: REPORTS
   ========================================================= */
function renderReports(){
  document.getElementById('fabBtn').style.display='none';
  const tab = subState.tab || 'daily';
  let html = `<div class="section-header"><h2>التقارير</h2></div>
  <div class="tabs">
    <div class="tab ${tab==='daily'?'active':''}" data-t="daily">يومي</div>
    <div class="tab ${tab==='monthly'?'active':''}" data-t="monthly">شهري</div>
    <div class="tab ${tab==='profit'?'active':''}" data-t="profit">الأرباح</div>
    <div class="tab ${tab==='stock'?'active':''}" data-t="stock">المخزون</div>
    <div class="tab ${tab==='debts'?'active':''}" data-t="debts">الديون</div>
  </div>`;

  if(tab==='daily'){
    const today = DB.invoices.filter(i=>i.date===todayISO());
    html += reportSummary([['عدد الفواتير',today.length],['الإجمالي',fmtMoney(today.reduce((s,i)=>s+i.total,0))],['المحصّل',fmtMoney(today.reduce((s,i)=>s+i.paidAtSale,0))]]);
    html += today.length ? today.map(i=>invoiceRow(i)).join('') : emptyState('لا توجد مبيعات اليوم','');
  } else if(tab==='monthly'){
    const ym = todayISO().slice(0,7);
    const month = DB.invoices.filter(i=>i.date.startsWith(ym));
    html += reportSummary([['عدد الفواتير',month.length],['الإجمالي',fmtMoney(month.reduce((s,i)=>s+i.total,0))],['المحصّل',fmtMoney(month.reduce((s,i)=>s+i.paidAtSale,0))]]);
    html += month.length ? month.map(i=>invoiceRow(i)).join('') : emptyState('لا توجد مبيعات هذا الشهر','');
  } else if(tab==='profit'){
    let profit = 0, revenue=0, cost=0;
    DB.invoices.forEach(i=>{
      revenue += i.total;
      i.items.forEach(it=>{
        const p = DB.products.find(x=>x.id===it.productId);
        if(p) cost += p.buyPrice*it.qty;
      });
    });
    profit = revenue - cost;
    html += reportSummary([['إجمالي المبيعات',fmtMoney(revenue)],['إجمالي التكلفة',fmtMoney(cost)],['صافي الربح',fmtMoney(profit)]]);
  } else if(tab==='stock'){
    html += DB.products.length ? DB.products.map(p=>`<div class="card"><div class="card-row"><div><div class="card-title">${p.name} — ${p.weight}</div><div class="card-sub">قيمة المخزون: ${fmtMoney(p.qty*p.buyPrice)}</div></div><div class="card-badge ${p.qty<=p.minStock?'badge-danger':'badge-ok'}">${p.qty}</div></div></div>`).join('') : emptyState('لا توجد منتجات','');
  } else if(tab==='debts'){
    const list = DB.merchants.map(m=>({m,bal:merchantBalance(m.id)})).filter(x=>x.bal.remaining>0);
    html += reportSummary([['عدد التجار المدينين',list.length],['إجمالي الديون',fmtMoney(totalDebts())]]);
    html += list.length ? list.map(x=>`<div class="card"><div class="card-row"><div class="card-title">${x.m.name}</div><div class="card-badge badge-danger">${fmtMoney(x.bal.remaining)}</div></div></div>`).join('') : emptyState('لا توجد ديون','');
  }

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('.tab').forEach(el=> el.addEventListener('click', ()=>{ subState.tab = el.dataset.t; renderReports(); }));
}
function reportSummary(pairs){
  return `<div class="stat-grid" style="margin-bottom:14px;">${pairs.map(([label,val])=>`<div class="stat-card"><div class="stat-value">${val}</div><div class="stat-label">${label}</div></div>`).join('')}</div>`;
}
function invoiceRow(i){
  const mer = DB.merchants.find(m=>m.id===i.merchantId);
  return `<div class="card"><div class="card-row"><div><div class="card-title">${mer?mer.name:'عميل نقدي'}</div><div class="card-sub">${fmtDate(i.date)}</div></div><div class="card-badge badge-ok">${fmtMoney(i.total)}</div></div></div>`;
}

/* =========================================================
   RENDER: OFFERS (العروض والتخفيضات)
   ========================================================= */
function renderOffers(){
  const fab = document.getElementById('fabBtn');
  fab.style.display='flex'; fab.onclick = ()=> openOfferForm();

  const list = (DB.offers||[]).slice().reverse();
  let html = `<div class="section-header"><h2>العروض والتخفيضات</h2></div>`;
  html += list.length ? list.map(o=>`
    <div class="card">
      <div class="card-row">
        <div><div class="card-title">${o.title}</div>
        <div class="card-sub">${o.discountType==='percent'? 'خصم '+o.value+'%' : 'خصم '+fmtMoney(o.value)}${o.notes?' · '+o.notes:''}</div></div>
        <div class="card-badge ${o.active?'badge-ok':'badge-warn'}">${o.active?'مفعّل':'موقوف'}</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-outline btn-sm" data-toggle="${o.id}">${o.active?'إيقاف':'تفعيل'}</button>
        <button class="btn btn-outline btn-sm" data-edit="${o.id}">تعديل</button>
        <button class="btn btn-danger btn-sm" data-del="${o.id}">حذف</button>
      </div>
    </div>`).join('') : emptyState('لا توجد عروض حالياً', 'اضغط + لإضافة عرض أو خصم جديد — سيظهر تلقائيًا عند إنشاء فاتورة بيع');

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('[data-edit]').forEach(el=> el.addEventListener('click', ()=> openOfferForm(el.dataset.edit)));
  document.querySelectorAll('[data-del]').forEach(el=> el.addEventListener('click', ()=>{
    if(confirm('هل تريد حذف هذا العرض؟')){ DB.offers = DB.offers.filter(o=>o.id!==el.dataset.del); saveDB(); renderOffers(); toast('تم الحذف'); }
  }));
  document.querySelectorAll('[data-toggle]').forEach(el=> el.addEventListener('click', ()=>{
    const off = DB.offers.find(o=>o.id===el.dataset.toggle); off.active = !off.active; saveDB(); renderOffers();
  }));
}

function openOfferForm(id){
  const off = id ? DB.offers.find(x=>x.id===id) : null;
  const body = `
    <div class="field"><label>اسم العرض</label><input id="f_title" placeholder="مثال: عرض نهاية الأسبوع" value="${off?off.title:''}"></div>
    <div class="field-row">
      <div class="field"><label>نوع الخصم</label>
        <select id="f_type">
          <option value="percent" ${off&&off.discountType==='percent'?'selected':''}>نسبة %</option>
          <option value="amount" ${off&&off.discountType==='amount'?'selected':''}>مبلغ ثابت</option>
        </select>
      </div>
      <div class="field"><label>القيمة</label><input id="f_val" type="number" value="${off?off.value:''}"></div>
    </div>
    <div class="field"><label>ملاحظات (اختياري)</label><input id="f_notes" value="${off?off.notes||'':''}"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">${off?'حفظ التعديل':'إضافة العرض'}</button>
    </div>`;
  const ov = openModal(off?'تعديل عرض':'إضافة عرض جديد', body, o=>{
    o.querySelector('#cancelBtn').addEventListener('click', ()=> closeModal(o));
    o.querySelector('#saveBtn').addEventListener('click', ()=>{
      const title = o.querySelector('#f_title').value.trim();
      const discountType = o.querySelector('#f_type').value;
      const value = parseFloat(o.querySelector('#f_val').value)||0;
      const notes = o.querySelector('#f_notes').value.trim();
      if(!title || value<=0){ toast('يرجى إدخال اسم العرض وقيمة صحيحة'); return; }
      if(off){ Object.assign(off, {title, discountType, value, notes}); }
      else { DB.offers.push({id:uid(), title, discountType, value, notes, active:true}); }
      saveDB(); closeModal(o); renderOffers(); toast('تم الحفظ بنجاح');
    });
  });
}

/* =========================================================
   RENDER: BACKUP
   ========================================================= */
function renderBackup(){
  document.getElementById('fabBtn').style.display='none';
  let html = `<div class="section-header"><h2>النسخ الاحتياطي</h2></div>
  <div class="card">
    <div class="card-title">تصدير نسخة احتياطية</div>
    <div class="card-sub">احفظ نسخة من جميع بياناتك (منتجات، تجار، فواتير، دفعات) في ملف واحد</div>
    <button class="btn btn-primary btn-block" id="exportBtn" style="margin-top:10px;">تصدير نسخة احتياطية</button>
  </div>
  <div class="card">
    <div class="card-title">استيراد نسخة احتياطية</div>
    <div class="card-sub">سيتم استبدال البيانات الحالية بالكامل بالبيانات الموجودة في الملف</div>
    <input type="file" id="importFile" accept="application/json" style="margin-top:10px;">
    <button class="btn btn-danger btn-block" id="importBtn" style="margin-top:10px;">استيراد واستبدال البيانات</button>
  </div>`;
  document.getElementById('content').innerHTML = html;
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `algahwagy-backup-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    toast('تم تصدير النسخة الاحتياطية');
  });
  document.getElementById('importBtn').addEventListener('click', ()=>{
    const file = document.getElementById('importFile').files[0];
    if(!file){ toast('يرجى اختيار ملف أولاً'); return; }
    if(!confirm('سيتم استبدال جميع البيانات الحالية، هل أنت متأكد؟')) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        DB = Object.assign(defaultDB(), parsed);
        saveDB(); toast('تم استيراد البيانات بنجاح'); navigate('dashboard');
      }catch(e){ toast('ملف غير صالح'); }
    };
    reader.readAsText(file);
  });
}

/* =========================================================
   RENDER: SETTINGS
   ========================================================= */
function renderSettings(){
  document.getElementById('fabBtn').style.display='none';
  let html = `<div class="section-header"><h2>الإعدادات</h2></div>
  <div class="card">
    <div class="card-title" style="margin-bottom:8px;">شعار المحل</div>
    <div style="display:flex;align-items:center;gap:14px;">
      <img src="${DB.settings.logo||''}" style="width:64px;height:64px;border-radius:14px;object-fit:cover;border:1px solid var(--line);">
      <div style="flex:1;">
        <input type="file" id="logoFile" accept="image/*" style="margin-bottom:8px;">
        <button class="btn btn-outline btn-sm btn-block" id="changeLogoBtn">تغيير الشعار</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="field"><label>اسم المحل</label><input id="f_shopname" value="${DB.settings.shopName}"></div>
    <div class="field"><label>الوصف الفرعي</label><input id="f_shopsub" value="${DB.settings.shopSub}"></div>
    <div class="field"><label>مدة التأخير الافتراضية للتذكير (أيام)</label>
      <select id="f_remdays">
        <option value="7" ${DB.settings.reminderDays==7?'selected':''}>7 أيام</option>
        <option value="15" ${DB.settings.reminderDays==15?'selected':''}>15 يوم</option>
        <option value="30" ${DB.settings.reminderDays==30?'selected':''}>30 يوم</option>
      </select>
    </div>
    <button class="btn btn-primary btn-block" id="saveSettings">حفظ الإعدادات</button>
  </div>
  <div class="card">
    <div class="card-title">حول التطبيق</div>
    <div class="card-sub">شركة القهوجي Algahwagy — نظام إدارة مخازن ومبيعات ومحاسبة لمحمصة وتوزيع البن. يعمل بالكامل دون إنترنت، وجميع البيانات محفوظة على هذا الجهاز فقط. قابل للتطوير مستقبلاً لدعم عدة مستخدمين ومزامنة سحابية.</div>
  </div>
  <div class="card">
    <div class="card-title">طباعة عبر بلوتوث</div>
    <div class="card-sub">لطباعة الفواتير وكشوف الحساب على طابعة حرارية بلوتوث، يُنصح بتثبيت تطبيق RawBT (متوفر مجانًا) الذي يستقبل أمر الطباعة من المتصفح ويرسله للطابعة الحرارية مباشرة.</div>
  </div>`;
  document.getElementById('content').innerHTML = html;
  document.getElementById('saveSettings').addEventListener('click', ()=>{
    DB.settings.shopName = document.getElementById('f_shopname').value.trim() || 'شركة القهوجي';
    DB.settings.shopSub = document.getElementById('f_shopsub').value.trim();
    DB.settings.reminderDays = parseInt(document.getElementById('f_remdays').value);
    saveDB(); applyBranding(); toast('تم حفظ الإعدادات');
  });
  document.getElementById('changeLogoBtn').addEventListener('click', ()=>{
    const file = document.getElementById('logoFile').files[0];
    if(!file){ toast('يرجى اختيار صورة أولاً'); return; }
    const reader = new FileReader();
    reader.onload = ()=>{
      DB.settings.logo = reader.result;
      saveDB(); applyBranding(); renderSettings(); toast('تم تغيير الشعار بنجاح');
    };
    reader.readAsDataURL(file);
  });
}
function applyBranding(){
  document.getElementById('brandName').textContent = DB.settings.shopName;
  document.getElementById('brandSub').textContent = DB.settings.shopSub;
  document.getElementById('logoImg').src = DB.settings.logo || DEFAULT_LOGO;
}

/* =========================================================
   RENDER: MORE (menu for bottom nav "المزيد")
   ========================================================= */
function renderMore(){
  document.getElementById('fabBtn').style.display='none';
  let html = `<div class="section-header"><h2>المزيد</h2></div>
  <div class="menu-grid">
    ${menuBtn('debts','الدفعات والتحصيل','payments')}
    ${menuBtn('offers','العروض والتخفيضات','offers')}
    ${menuBtn('reminders','التذكيرات','bell')}
    ${menuBtn('production','الإنتاج والتحميص','roast')}
    ${menuBtn('reports','التقارير','reports')}
    ${menuBtn('backup','نسخ احتياطي','backup')}
    ${menuBtn('settings','الإعدادات','settings')}
  </div>`;
  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('.menu-btn').forEach(el=> el.addEventListener('click', ()=> navigate(el.dataset.go)));
}

/* =========================================================
   MAIN RENDER SWITCH
   ========================================================= */
function render(){
  switch(currentScreen){
    case 'dashboard': renderDashboard(); break;
    case 'products': renderProducts(); break;
    case 'merchants': renderMerchants(); break;
    case 'statement': renderStatement(); break;
    case 'sales': renderSales(); break;
    case 'debts': renderDebts(); break;
    case 'reminders': renderReminders(); break;
    case 'production': renderProduction(); break;
    case 'offers': renderOffers(); break;
    case 'reports': renderReports(); break;
    case 'backup': renderBackup(); break;
    case 'settings': renderSettings(); break;
    case 'more': renderMore(); break;
    default: renderDashboard();
  }
}

applyBranding();
navigate('dashboard');

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
